<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kindergarten EFL Letter Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue-team: #4A90E2;
            --red-team: #FF5E5E;
            --green-btn: #66BB6A;
            --yellow-btn: #FFD54F;
            --glossy: linear-gradient(180deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 50%);
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Fredoka', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            background-color: #f0f0f0;
        }

        /* --- PAGES --- */
        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            text-align: center;
        }

        .page.active { display: flex; }

        /* --- BACKGROUNDS --- */
        #home-page { 
            background: url('home_page.png'), #E0F7FA; 
            background-size: cover;
            background-position: center;
            justify-content: flex-end; 
            align-items: flex-end;    
            padding-right: 12%;        
            padding-bottom: 5%; /* Moved slightly downward as requested */
        }
        #game-page { 
            background: url('game_page.png'), #ffffff; 
            background-size: cover;
        }
        #result-page { 
            background: url('result_page.png'), #FFF9C4; 
            background-size: cover;
            justify-content: center;
            align-items: center;
        }

        /* --- UI ELEMENTS --- */
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn {
            position: relative;
            padding: 25px 60px;
            font-size: 2.5rem;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            color: white;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            box-shadow: 0 12px 0 rgba(0,0,0,0.2);
            min-width: 320px;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 2px; left: 10%; right: 10%; height: 40%;
            background: var(--glossy);
            border-radius: 40px;
            pointer-events: none;
        }

        .btn:active { transform: scale(0.85); box-shadow: 0 4px 0 rgba(0,0,0,0.2); }

        .btn-green { background: var(--green-btn); box-shadow: 0 12px 0 #388E3C; }
        .btn-yellow { background: var(--yellow-btn); color: #5D4037; box-shadow: 0 12px 0 #FFA000; }
        .btn-blue { background: var(--blue-team); box-shadow: 0 12px 0 #1976D2; }

        /* --- MODAL --- */
        #modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal {
            background: white;
            padding: 50px;
            border-radius: 50px;
            text-align: center;
            border: 10px solid var(--yellow-btn);
            max-width: 500px;
        }

        /* --- GAME LAYOUT --- */
        #game-container {
            display: flex;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .team-side {
            flex: 1;
            height: 100%;
            position: relative;
            overflow: hidden;
            background-color: rgba(255, 255, 255, 0.6); 
            border: 4px solid rgba(255,255,255,0.4);
        }

        .score-box {
            font-size: 3rem;
            padding: 20px;
            margin: 15px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            z-index: 10;
            position: relative;
        }
        #side-1 .score-box { color: var(--blue-team); border: 5px solid var(--blue-team); }
        #side-2 .score-box { color: var(--red-team); border: 5px solid var(--red-team); }

        .timer-display {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 10px 45px;
            border-radius: 50px;
            font-size: 2.8rem;
            z-index: 20;
            border: 6px solid #FFF;
        }

        /* Replay Audio Button - Middle Center */
        .replay-audio-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 30;
            background: white;
            border-radius: 50%;
            width: 120px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 10px 0 #ddd, 0 15px 25px rgba(0,0,0,0.2);
            border: 8px solid #f0f0f0;
            transition: transform 0.1s;
        }

        .replay-audio-center:active {
            transform: translate(-50%, -50%) scale(0.9);
        }

        .audio-icon {
            width: 60px;
            height: 60px;
            background-color: #333;
            mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>') no-repeat center;
            -webkit-mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>') no-repeat center;
        }

        /* --- LETTERS --- */
        .letter {
            position: absolute;
            width: 110px;
            height: 110px;
            background: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4.5rem;
            font-weight: 600;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            animation: fall linear forwards;
            cursor: pointer;
            z-index: 5;
        }
        #side-1 .letter { border: 8px solid var(--blue-team); color: var(--blue-team); }
        #side-2 .letter { border: 8px solid var(--red-team); color: var(--red-team); }

        @keyframes fall {
            from { transform: translateY(-130px); }
            to { transform: translateY(110vh); }
        }

        .freeze-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(40, 40, 40, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 15;
            animation: shake 0.4s;
            backdrop-filter: blur(5px);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-20px); }
            75% { transform: translateX(20px); }
        }
    </style>
</head>
<body>

    <div id="home-page" class="page active">
        <div class="btn-container">
            <button class="btn btn-green" onclick="startGame()">START</button>
            <button class="btn btn-yellow" onclick="toggleModal(true)">INSTRUCTION</button>
        </div>
    </div>

    <div id="modal-overlay">
        <div class="modal">
            <h2 style="font-size: 3rem;">How to Play</h2>
            <p style="font-size: 2rem;">Listen to the letter.<br>Click the correct letter fast.</p>
            <button class="btn btn-blue" onclick="toggleModal(false)">CLOSE</button>
        </div>
    </div>

    <div id="game-page" class="page">
        <div class="timer-display" id="timer">60</div>
        
        <div class="replay-audio-center" onclick="speakCurrentLetter()">
            <div class="audio-icon"></div>
        </div>

        <div id="game-container">
            <div id="side-1" class="team-side">
                <div class="score-box">Group 1: <span id="score1">0</span></div>
                <div id="area-1" style="flex:1; position:relative;"></div>
                <div id="freeze-1" class="freeze-overlay"></div>
            </div>
            <div id="side-2" class="team-side">
                <div class="score-box">Group 2: <span id="score2">0</span></div>
                <div id="area-2" style="flex:1; position:relative;"></div>
                <div id="freeze-2" class="freeze-overlay"></div>
            </div>
        </div>
    </div>

    <div id="result-page" class="page">
        <h1 id="winner-text" style="font-size: 5rem; text-shadow: 4px 4px 0 white;">Winner!</h1>
        <div style="font-size: 3.5rem; margin: 30px; background: white; padding: 30px; border-radius: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);">
            Group 1: <span id="final-1">0</span> — Group 2: <span id="final-2">0</span>
        </div>
        <div style="display:flex; gap: 20px;">
            <button class="btn btn-green" onclick="startGame()">RESTART</button>
            <button class="btn btn-blue" onclick="location.reload()">HOME</button>
        </div>
    </div>

    <script>
        const letters = ['N', 'O', 'P', 'Q', 'R', 'S'];
        let currentLetter = '';
        let score1 = 0, score2 = 0, timeLeft = 60;
        let gameActive = false;
        let spawnInterval, timerInterval;
        let frozen = [false, false];

        const synth = window.speechSynthesis;

        function toggleModal(show) {
            document.getElementById('modal-overlay').style.display = show ? 'flex' : 'none';
        }

        function speakCurrentLetter() {
            if (!currentLetter) return;
            synth.cancel(); 
            const utter = new SpeechSynthesisUtterance("Letter " + currentLetter);
            utter.lang = 'en-US';
            utter.rate = 0.45;
            synth.speak(utter);
        }

        function startGame() {
            score1 = 0; score2 = 0; timeLeft = 60;
            gameActive = true;
            frozen = [false, false];
            
            document.getElementById('score1').innerText = '0';
            document.getElementById('score2').innerText = '0';
            document.getElementById('timer').innerText = timeLeft;
            document.getElementById('freeze-1').style.display = 'none';
            document.getElementById('freeze-2').style.display = 'none';
            clearAllLetters();
            
            showPage('game-page');
            nextRound();
            
            if(spawnInterval) clearInterval(spawnInterval);
            if(timerInterval) clearInterval(timerInterval);

            spawnInterval = setInterval(synchronizedSpawn, 1500);
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if (timeLeft <= 0) endGame();
            }, 1000);
        }

        function nextRound() {
            if (!gameActive) return;
            currentLetter = letters[Math.floor(Math.random() * letters.length)];
            speakCurrentLetter();
        }

        function synchronizedSpawn() {
            if (!gameActive) return;
            
            const isTarget = Math.random() < 0.35;
            const charToSpawn = isTarget ? currentLetter : letters[Math.floor(Math.random() * letters.length)];
            const randomX = (Math.random() * 70 + 5) + '%';
            
            createLetterElement(1, charToSpawn, randomX);
            createLetterElement(2, charToSpawn, randomX);
        }

        function createLetterElement(team, char, xPos) {
            const area = document.getElementById(`area-${team}`);
            const div = document.createElement('div');
            div.className = 'letter';
            div.innerText = char;
            div.style.left = xPos;
            div.style.animationDuration = '5s';
            
            div.onclick = (e) => {
                e.stopPropagation();
                if (!gameActive || frozen[team - 1]) return;
                
                if (char === currentLetter) {
                    team === 1 ? score1++ : score2++;
                    updateScoreDisplay();
                    clearAllLetters();
                    nextRound();
                } else {
                    applyFreeze(team);
                }
            };
            
            area.appendChild(div);
            setTimeout(() => { if(div.parentNode) div.remove(); }, 5000);
        }

        function applyFreeze(team) {
            frozen[team - 1] = true;
            document.getElementById(`freeze-${team}`).style.display = 'flex';
            setTimeout(() => {
                frozen[team - 1] = false;
                document.getElementById(`freeze-${team}`).style.display = 'none';
            }, 3000);
        }

        function updateScoreDisplay() {
            document.getElementById('score1').innerText = score1;
            document.getElementById('score2').innerText = score2;
        }

        function clearAllLetters() {
            document.getElementById('area-1').innerHTML = '';
            document.getElementById('area-2').innerHTML = '';
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function endGame() {
            gameActive = false;
            clearInterval(spawnInterval);
            clearInterval(timerInterval);
            
            const winEl = document.getElementById('winner-text');
            if (score1 > score2) winEl.innerText = "Group 1 Wins!";
            else if (score2 > score1) winEl.innerText = "Group 2 Wins!";
            else winEl.innerText = "It's a Draw!";
            
            document.getElementById('final-1').innerText = score1;
            document.getElementById('final-2').innerText = score2;
            showPage('result-page');
        }
    </script>
</body>
</html>
